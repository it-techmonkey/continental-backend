services:
  - type: web
    name: continental-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: cd backend && npm install && npm run db:generate && npm run build && npx prisma db seed
    startCommand: cd backend && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: continental-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_BUCKET_NAME
        sync: false

databases:
  - name: continental-postgres
    plan: free
